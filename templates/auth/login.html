{% extends "base.html" %}
{% block title %}Heathify | Enter the Circle{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box glass-card animate-fade-up" style="text-align:center;">
        <div style="font-size:2rem;margin-bottom:0.5rem;">☕</div>
        <h2 style="margin-bottom:0.3rem;">Enter the Circle</h2>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:2rem;">Access your premium wellness account
        </p>
        <form method="POST" action="{{ url_for('login') }}">
            <input type="text" name="username" class="auth-input" placeholder="Username" required
                autocomplete="username">
            <input type="password" name="password" class="auth-input" placeholder="Password" required
                autocomplete="current-password">
            <button type="submit" class="btn-premium"
                style="width:100%;margin-top:1.2rem;padding:14px;font-size:0.9rem;">Access Account →</button>
        </form>
        <p style="margin-top:1.5rem;font-size:0.82rem;color:var(--text-muted);">
            No account? <a href="{{ url_for('signup') }}" style="color:var(--accent);font-weight:600;">Apply for
                Membership</a>
        </p>
    </div>
</div>
{% endblock %}
